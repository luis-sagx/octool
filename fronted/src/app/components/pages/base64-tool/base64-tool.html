<div class="page-content">
  <h2 class="page-title">Base64 Converter</h2>

  <app-input-box
    [value]="inputText"
    (valueChange)="inputText = $event"
    [rows]="5"
    placeholder="Enter text or Base64 string here..."
    inputClass="w-full p-4 mb-6 bg-white border shadow-sm resize-none border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500"
  />

  @if(hasError){
  <div class="flex items-center gap-2 mb-4 font-semibold text-red-700">
    <i class="text-xl fas fa-exclamation-triangle"></i>
    <span>Error: Invalid input or contains unsupported characters.</span>
  </div>
  }

  <div class="flex flex-wrap gap-4 mb-6">
    <div class="flex gap-4">
      <button
        (click)="convertToBase64()"
        class="px-5 py-2 text-white transition bg-brand-600 shadow-md rounded-xl hover:bg-brand-700"
      >
        Text → Base64
      </button>

      <button
        (click)="convertToText()"
        class="px-5 py-2 text-white transition bg-brand-600 shadow-md rounded-xl hover:bg-brand-700"
      >
        Base64 → Text
      </button>
    </div>
    <div class="flex gap-4 ml-auto">
      <button
        (click)="clear()"
        class="px-5 py-2 text-white transition shadow-md bg-slate-600 rounded-xl hover:bg-slate-700"
      >
        Clear
      </button>
    </div>
  </div>

  <h3 class="mb-2 text-lg font-semibold text-slate-700">Result:</h3>

  <app-output-box [text]="result" />
</div>
