<button
  (click)="copyText()"
  class="text-sm font-medium px-3 py-1 text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition flex items-center gap-1"
>
  @if (!copied()) {
  <span><i class="fa-solid fa-copy text-slate-600"></i> Copy</span>
  } @else {
  <span><i class="fa-solid fa-check text-slate-600"></i> Copied</span>
  }
</button>
