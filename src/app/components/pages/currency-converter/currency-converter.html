<div
  class="flex flex-col gap-6 p-4 sm:p-6 border border-zinc-800 rounded-3xl bg-zinc-950/60 text-slate-100 shadow-[0_24px_60px_rgba(8,10,20,0.45)]"
>
  <div>
    <h2 class="text-3xl font-semibold tracking-tight text-brand-100">
      Currency Converter
    </h2>
    <p class="mt-1 text-sm text-zinc-500">
      Convert between currencies using live exchange rates.
    </p>
  </div>

  <!-- Error -->
  @if (error()) {
  <p class="flex items-center gap-2 text-sm font-semibold text-red-400">
    <i class="fas fa-exclamation-triangle"></i>
    {{ error() }}
  </p>
  }

  <!-- Inputs -->
  <div class="flex flex-wrap items-end gap-4 p-4 bg-zinc-900/60 border border-zinc-800 rounded-xl">
    <!-- From -->
    <label class="flex flex-col gap-1.5 text-sm font-semibold text-slate-300">
      From
      <select
        [value]="fromCurrency()"
        (change)="onFromCurrencyChange($any($event.target).value)"
        class="px-3 py-2 bg-zinc-900 border border-zinc-700 rounded-lg text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand-500 min-w-[120px]"
      >
        @for (currency of currencies(); track currency) {
        <option [value]="currency">{{ currency }}</option>
        }
      </select>
    </label>

    <!-- Amount -->
    <label class="flex flex-col gap-1.5 text-sm font-semibold text-slate-300">
      Amount
      <input
        type="number"
        min="0"
        step="0.01"
        [value]="amount()"
        (input)="onAmountChange(+$any($event.target).value)"
        class="w-32 px-3 py-2 bg-zinc-900 border border-zinc-700 rounded-lg text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand-500"
      />
    </label>

    <!-- Swap Button -->
    <button
      (click)="swap()"
      class="flex items-center justify-center w-10 h-10 mb-0.5 transition border rounded-full border-zinc-700 text-zinc-400 hover:text-brand-400 hover:border-brand-500"
    >
      <i class="fas fa-exchange-alt"></i>
    </button>

    <!-- To -->
    <label class="flex flex-col gap-1.5 text-sm font-semibold text-slate-300">
      To
      <select
        [value]="toCurrency()"
        (change)="onToCurrencyChange($any($event.target).value)"
        class="px-3 py-2 bg-zinc-900 border border-zinc-700 rounded-lg text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand-500 min-w-[120px]"
      >
        @for (currency of currencies(); track currency) {
        <option [value]="currency">{{ currency }}</option>
        }
      </select>
    </label>
  </div>

  <!-- Result -->
  <div class="flex flex-col items-center justify-center p-6 bg-zinc-900/80 border border-zinc-800 rounded-xl">
    @if (loading()) {
    <div class="flex items-center gap-2 text-zinc-400">
      <svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
      </svg>
      Loading rates...
    </div>
    } @else {
    <p class="mb-2 text-sm text-zinc-400">Result</p>
    <p class="text-5xl font-bold text-brand-400">
      {{ result() | number:'1.2-2' }} {{ toCurrency() }}
    </p>
    @if (lastUpdated()) {
    <p class="mt-2 text-xs text-zinc-500">
      Last updated: {{ lastUpdated() }}
    </p>
    }
    }
  </div>
</div>
