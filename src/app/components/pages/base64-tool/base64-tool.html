<div
  class="flex flex-col gap-6 p-6 border border-zinc-800 rounded-3xl bg-zinc-950/60 text-slate-100 shadow-[0_24px_60px_rgba(8,10,20,0.45)]"
>
  <h2 class="text-3xl font-semibold tracking-tight text-brand-100">
    Base64 de imágenes
  </h2>

  <div
    class="flex flex-col gap-3 p-4 border rounded-2xl border-zinc-800 bg-zinc-900/60"
  >
    <h3 class="text-lg font-semibold text-slate-200">Imagen → Base64</h3>

    <input
      type="file"
      accept="image/*"
      (change)="onFileSelected($event)"
      class="block w-full text-sm text-slate-300 file:mr-4 file:rounded-lg file:border-0 file:bg-brand-600 file:px-4 file:py-2 file:font-semibold file:text-white hover:file:bg-brand-700"
    />

    <button
      (click)="convertImageToBase64()"
      [disabled]="loading"
      class="self-start px-5 py-2 text-white transition bg-brand-600 rounded-xl hover:bg-brand-700 disabled:opacity-50"
    >
      {{ loading ? 'Procesando...' : 'Convertir imagen a Base64' }}
    </button>
  </div>

  <div
    class="flex flex-col gap-3 p-4 border rounded-2xl border-zinc-800 bg-zinc-900/60"
  >
    <h3 class="text-lg font-semibold text-slate-200">Base64 → Imagen</h3>
    <app-input-box
      [value]="base64Input"
      (valueChange)="base64Input = $event"
      [rows]="5"
      placeholder="Pega aquí tu string Base64 (puede incluir data:image/...;base64,...)"
      inputClass="w-full p-4 text-slate-100 placeholder:text-slate-500 bg-zinc-900 border border-zinc-700 shadow-sm resize-none rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500"
    />

    <label class="flex flex-col gap-2 text-sm font-semibold text-slate-300">
      Formato salida
      <select
        [(ngModel)]="outputFormat"
        class="px-3 py-2 border rounded-lg bg-zinc-900 border-zinc-700"
      >
        <option value="png">PNG</option>
        <option value="jpeg">JPEG</option>
        <option value="webp">WEBP</option>
        <option value="bmp">BMP</option>
      </select>
    </label>

    <button
      (click)="convertBase64ToImage()"
      [disabled]="loading"
      class="self-start px-5 py-2 text-white transition bg-brand-600 rounded-xl hover:bg-brand-700 disabled:opacity-50"
    >
      {{ loading ? 'Procesando...' : 'Convertir Base64 a imagen' }}
    </button>
  </div>

  @if(hasError){
  <div class="flex items-center gap-2 mb-4 font-semibold text-red-300">
    <i class="text-xl fas fa-exclamation-triangle"></i>
    <span>{{ errorMessage }}</span>
  </div>
  }

  <div class="flex gap-4 ml-auto">
    <button
      (click)="clear()"
      class="px-5 py-2 text-white transition shadow-md bg-slate-600 rounded-xl hover:bg-slate-700"
    >
      Limpiar
    </button>
  </div>

  <h3 class="mb-2 text-lg font-semibold text-slate-200">Base64 resultante:</h3>

  <app-output-box [text]="base64Result" />

  @if (resultImageDataUrl) {
  <div class="flex flex-col gap-3">
    <h3 class="text-lg font-semibold text-slate-200">Vista previa:</h3>
    <img
      [src]="resultImageDataUrl"
      alt="Resultado base64"
      class="max-w-full border rounded-xl border-zinc-700 bg-zinc-900"
    />
  </div>
  }
</div>
