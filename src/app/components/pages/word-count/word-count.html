<div class="px-4 mx-auto mt-10">
  <h2 class="mb-2 text-2xl font-semibold text-slate-800">Word counter</h2>

  <app-input-box
    [value]="inputText()"
    (valueChange)="inputText.set($event)"
    [rows]="5"
    placeholder="Type text here..."
    inputClass="w-full p-4 mb-6 bg-white border shadow-sm resize-none border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500"
  />

  <div class="flex flex-wrap gap-4 mb-6">
    <div class="flex gap-4 ml-auto">
      <button
        (click)="clear()"
        class="px-5 py-2 text-white transition shadow-md bg-slate-500 rounded-xl hover:bg-slate-600"
      >
        Clear
      </button>
    </div>
  </div>

  <h3 class="mb-2 font-semibold text-slate-700">Result:</h3>

  <h4 class="mb-2 font-semibold text-slate-700">Word Count:</h4>
  <p
    class="w-full p-4 whitespace-pre-line border shadow-inner h-14 bg-slate-100 border-slate-300 rounded-xl"
  >
    {{ wordCount() }}
  </p>

  <h4 class="mt-4 mb-2 font-semibold text-slate-700">Character Count:</h4>
  <p
    class="w-full p-4 whitespace-pre-line border shadow-inner h-14 bg-slate-100 border-slate-300 rounded-xl"
  >
    {{ charCount() }}
  </p>
</div>
