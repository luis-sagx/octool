<div class="px-4 mx-auto mt-10">
  <h2 class="mb-2 text-2xl font-semibold text-slate-800">
    Uppercase and Lowercase Converter
  </h2>

  <app-input-box
    [value]="inputText"
    (valueChange)="inputText = $event"
    [rows]="5"
    placeholder="Type text here..."
    inputClass="w-full p-4 mb-4 bg-white border shadow-sm resize-none border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500"
  />

  @if (hasError) {
  <div class="flex items-center gap-2 mb-4 font-semibold text-red-600">
    <i class="text-xl fas fa-exclamation-triangle"></i>
    <span>Please enter valid text.</span>
  </div>
  }

  <div class="flex flex-wrap gap-4 mb-6">
    <div class="flex gap-4">
      <button
        (click)="toUpper()"
        class="px-5 py-2 text-white transition bg-indigo-600 shadow-md rounded-xl hover:bg-indigo-700"
      >
        Uppercase
      </button>

      <button
        (click)="toLower()"
        class="px-5 py-2 text-white transition bg-indigo-600 shadow-md rounded-xl hover:bg-indigo-700"
      >
        Lowercase
      </button>

      <button
        (click)="toCapital()"
        class="px-5 py-2 text-white transition bg-indigo-600 shadow-md rounded-xl hover:bg-indigo-700"
      >
        Capitalize
      </button>
    </div>

    <div class="flex gap-4 ml-auto">
      <button
        (click)="clear()"
        class="px-5 py-2 text-white transition shadow-md bg-slate-500 rounded-xl hover:bg-slate-600"
      >
        Clear
      </button>
    </div>
  </div>

  <h3 class="mb-2 text-lg font-semibold text-slate-700">Result:</h3>

  <app-output-box [text]="outputText" />
</div>
