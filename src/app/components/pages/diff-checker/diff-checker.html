<div
  class="flex flex-col gap-6 p-6 border border-zinc-800 rounded-3xl bg-zinc-950/60 text-slate-100 shadow-[0_24px_60px_rgba(8,10,20,0.45)]"
>
  <h2 class="text-3xl font-semibold tracking-tight text-brand-100">
    Diff Checker
  </h2>

  <div class="grid gap-6 mb-2 md:grid-cols-2">
    <app-input-box
      label="Original text"
      [multiline]="true"
      [rows]="10"
      [value]="leftText()"
      (valueChange)="leftText.set($event)"
      placeholder="Paste original text here..."
      inputClass="w-full p-4 font-mono text-sm text-slate-100 placeholder:text-slate-500 bg-zinc-900 border border-zinc-700 shadow-sm resize-y min-h-[300px] rounded-xl focus:ring-2 focus:ring-brand-500"
    >
    </app-input-box>

    <app-input-box
      label="New text"
      [multiline]="true"
      [rows]="10"
      [value]="rightText()"
      (valueChange)="rightText.set($event)"
      placeholder="Paste new/modified text here..."
      inputClass="w-full p-4 font-mono text-sm text-slate-100 placeholder:text-slate-500 bg-zinc-900 border border-zinc-700 shadow-sm resize-y min-h-[300px] rounded-xl focus:ring-2 focus:ring-brand-500"
    >
    </app-input-box>
  </div>

  <div class="flex gap-3 mb-6">
    <button
      (click)="computeDiff()"
      class="px-6 py-2 text-white transition bg-brand-600 rounded-xl hover:bg-brand-700"
    >
      Compare
    </button>
    <button
      (click)="clear()"
      class="px-6 py-2 text-white transition bg-slate-600 rounded-xl hover:bg-slate-700"
    >
      Clear
    </button>
  </div>

  @if (hasDiff()) {
  <div class="flex flex-wrap gap-4 mb-4">
    <span
      class="px-3 py-1 text-sm font-semibold border rounded-full text-emerald-200 bg-emerald-500/15 border-emerald-500/20"
    >
      +{{ addedCount() }} added
    </span>
    <span
      class="px-3 py-1 text-sm font-semibold border rounded-full text-rose-200 bg-rose-500/15 border-rose-500/20"
    >
      -{{ removedCount() }} removed
    </span>
    <span
      class="px-3 py-1 text-sm font-semibold border rounded-full bg-zinc-800 text-slate-300 border-zinc-700"
    >
      {{ unchangedCount() }} unchanged
    </span>
  </div>

  <div
    class="w-full overflow-x-auto font-mono text-sm border rounded-xl border-zinc-800"
  >
    @for (line of diffLines(); track $index) {
    <div
      [class]="line.type === 'added' ? 'bg-emerald-500/10 border-l-4 border-emerald-400 px-4 py-1 text-emerald-100' : 
              line.type === 'removed' ? 'bg-rose-500/10 border-l-4 border-rose-400 px-4 py-1 text-rose-100' : 
              'bg-zinc-900/40 border-l-4 border-transparent px-4 py-1 text-slate-300'"
    >
      <span class="mr-3 opacity-50 select-none">
        {{ line.type === 'added' ? '+' : line.type === 'removed' ? '-' : ' ' }}
      </span>
      <pre class="inline">{{ line.text || ' ' }}</pre>
    </div>
    }
  </div>
  }
</div>
