<div class="w-full max-w-6xl px-6 mx-auto mt-10">
  <h2 class="mb-2 text-2xl font-semibold text-slate-800">Diff Checker</h2>

  <div class="grid gap-6 mb-6 md:grid-cols-2">
    <div class="flex flex-col">
      <label class="mb-2 text-sm font-semibold text-slate-600"
        >Original text</label
      >
      <textarea
        [ngModel]="leftText()"
        (ngModelChange)="leftText.set($event)"
        rows="10"
        class="w-full p-4 font-mono text-sm bg-white border shadow-sm resize-y min-h-[300px] border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500"
        placeholder="Paste original text here..."
      ></textarea>
    </div>

    <div class="flex flex-col">
      <label class="mb-2 text-sm font-semibold text-slate-600">New text</label>
      <textarea
        [ngModel]="rightText()"
        (ngModelChange)="rightText.set($event)"
        rows="10"
        class="w-full p-4 font-mono text-sm bg-white border shadow-sm resize-y min-h-[300px] border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500"
        placeholder="Paste new/modified text here..."
      ></textarea>
    </div>
  </div>

  <div class="flex gap-3 mb-8">
    <button
      (click)="computeDiff()"
      class="px-6 py-2 text-white transition bg-indigo-600 rounded-xl hover:bg-indigo-700"
    >
      Compare
    </button>
    <button
      (click)="clear()"
      class="px-6 py-2 text-white transition bg-slate-500 rounded-xl hover:bg-slate-600"
    >
      Clear
    </button>
  </div>

  @if (hasDiff()) {
  <div class="flex flex-wrap gap-4 mb-4">
    <span
      class="px-3 py-1 text-sm font-semibold text-green-700 bg-green-100 rounded-full"
      >+{{ addedCount() }} added</span
    >
    <span
      class="px-3 py-1 text-sm font-semibold text-red-700 bg-red-100 rounded-full"
      >-{{ removedCount() }} removed</span
    >
    <span
      class="px-3 py-1 text-sm font-semibold rounded-full bg-slate-100 text-slate-600"
      >{{ unchangedCount() }} unchanged</span
    >
  </div>

  <div
    class="w-full overflow-x-auto font-mono text-sm border rounded-xl border-slate-200"
  >
    @for (line of diffLines(); track $index) {
    <div
      [class]="line.type === 'added' ? 'bg-green-50 border-l-4 border-green-400 px-4 py-1 text-green-900' : 
                      line.type === 'removed' ? 'bg-red-50 border-l-4 border-red-400 px-4 py-1 text-red-900' : 
                      'bg-white border-l-4 border-transparent px-4 py-1 text-slate-600'"
    >
      <span class="mr-3 opacity-50 select-none"
        >{{ line.type === 'added' ? '+' : line.type === 'removed' ? '-' : ' '
        }}</span
      >
      <pre class="inline">{{ line.text || ' ' }}</pre>
    </div>
    }
  </div>
  }
</div>
